name: Build Android APK

# Trigger build otomatis saat push ke branch main, atau dijalankan secara manual (workflow_dispatch)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Baris ini sangat penting agar Anda bisa melakukan 'Manual Build' di tombol GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Mendapatkan source code dari repositori
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Mengatur Java JDK 17 (versi standar untuk project modern Android/Gradle)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Memberikan akses eksekusi ke Gradle Wrapper
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 4. Melakukan proses build APK Debug
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 5. Mengunggah file APK yang berhasil dibuat ke GitHub Artifacts agar bisa di-download
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
