name: Android CI Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode repositori Anda
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Set up JDK (Java Development Kit) Versi 17 yang direkomendasikan untuk proyek Gradle modern ini
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle' # Mengaktifkan caching otomatis untuk mempercepat build selanjutnya

    # 3. Memberikan izin eksekusi pada gradlew (Sekarang aman dilakukan karena gradlew sudah ada)
    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    # 4. Melakukan kompilasi dan build APK (Debug mode)
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 5. Mengambil file APK yang berhasil di-build dan menyimpannya sebagai download link/artifact di GitHub
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
