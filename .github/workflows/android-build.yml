name: Build Android APK (Manual)

# Memicu pembuatan manual dan otomatis setiap kali melakukan push ke branch utama
on:
  workflow_dispatch: # Mengaktifkan tombol "Run workflow" manual di tab Actions GitHub
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode repositori Anda
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Java Development Kit (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # 3. Berikan izin eksekusi pada gradlew (Sekarang file ini pasti terbaca)
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 4. Bangun file APK (Debug Build)
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 5. Simpan file APK sebagai Artifact yang dapat diunduh
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
